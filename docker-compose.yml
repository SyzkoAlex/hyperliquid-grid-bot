version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hyperliquid-postgres
    environment:
      POSTGRES_DB: hyperliquid_grid_bot
      POSTGRES_USER: db-user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-db-password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hyperliquid-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hyperliquid']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: hyperliquid-postgres-test
    environment:
      POSTGRES_DB: hyperliquid_grid_bot_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    networks:
      - hyperliquid-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - test

  redis:
    image: redis:7-alpine
    container_name: hyperliquid-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - hyperliquid-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyperliquid-grid-bot
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hyperliquid:${POSTGRES_PASSWORD:-password}@postgres:5432/hyperliquid_grid_bot
      REDIS_URL: redis://redis:6379
      HYPERLIQUID_PRIVATE_KEY: ${HYPERLIQUID_PRIVATE_KEY}
      HYPERLIQUID_ACCOUNT_ADDRESS: ${HYPERLIQUID_ACCOUNT_ADDRESS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS}
      TELEGRAM_ENABLED: 'true'
      LOG_LEVEL: info
      LOG_PRETTY: 'false'
      METRICS_ENABLED: 'true'
      METRICS_PORT: 9090
    ports:
      - '9090:9090'
    volumes:
      - ./config:/app/config:ro
    networks:
      - hyperliquid-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:9090/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hyperliquid-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
