version: '3.8'

services:
    postgres:
        image: postgres:16-alpine
        container_name: hyperliquid-postgres
        environment:
            POSTGRES_DB: hyperliquid_grid_bot
            POSTGRES_USER: db-user
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-db-password}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - hyperliquid-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U hyperliquid']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: hyperliquid-redis
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - hyperliquid-network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:

networks:
    hyperliquid-network:
        driver: bridge
