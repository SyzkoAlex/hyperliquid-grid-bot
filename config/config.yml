app:
    name: hyperliquid-grid-bot
    env: ${APP_ENV:development}
    port: ${APP_PORT:3000}
    host: ${APP_HOST:0.0.0.0}

database:
    host: ${DATABASE_HOST:localhost}
    port: ${DATABASE_PORT:5432}
    user: ${DATABASE_USER:db-user}
    password: ${DATABASE_PASSWORD:db-password}
    database: ${DATABASE_NAME:hyperliquid_grid_bot}
    poolSize: ${DATABASE_POOL_SIZE:10}
    ssl: false

redis:
    url: ${REDIS_URL:redis://localhost:6379}
    db: ${REDIS_DB:0}
    connectTimeout: 10000

hyperliquid:
    apiUrl: ${HYPERLIQUID_API_URL:https://api.hyperliquid-testnet.xyz}
    testnet: ${HYPERLIQUID_TESTNET:true}
    # agentKeyEncryptionKey is required for agent wallet functionality; set via HYPERLIQUID_AGENT_KEY_ENCRYPTION_KEY env var
    agentKeyEncryptionKey: ${HYPERLIQUID_AGENT_KEY_ENCRYPTION_KEY}
    requestTimeout: ${HYPERLIQUID_REQUEST_TIMEOUT:30000}
    minOrderNotional: ${HYPERLIQUID_MIN_ORDER_NOTIONAL:10}
    sellSizeBuffer: ${HYPERLIQUID_SELL_SIZE_BUFFER:0.005}

telegram:
    enabled: ${TELEGRAM_ENABLED:true}
    botToken: ${TELEGRAM_BOT_TOKEN:0000000000:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
    allowedUserId: ${TELEGRAM_ALLOWED_USER_ID}  # restrict bot to a single Telegram user ID
    session:
        ttlSeconds: 86400
        keyPrefix: "tg:session:"
    pagination:
        activePageSize: 5
        stoppedPageSize: 5
    botLockTtlMs: ${TELEGRAM_BOT_LOCK_TTL_MS:60000} # 60 seconds

orders:
    pollIntervalMs: ${ORDERS_POLL_INTERVAL_MS:2000}
    recoveryIntervalMs: ${ORDERS_RECOVERY_INTERVAL_MS:600000} # 10 minutes
    pendingCleanupThresholdMs: ${ORDERS_PENDING_CLEANUP_THRESHOLD_MS:300000} # 5 minutes
    syncLockTtlMs: ${ORDERS_SYNC_LOCK_TTL_MS:30000} # 30 seconds
    restoreLockTtlMs: ${ORDERS_RESTORE_LOCK_TTL_MS:60000} # 60 seconds

tokens:
    topSize: ${TOKENS_TOP_SIZE:10}
    refreshIntervalMs: ${TOKENS_REFRESH_INTERVAL_MS:3600000} # 1 hour
    cacheTtlSeconds: ${TOKENS_CACHE_TTL_SECONDS:86400} # 24 hours
    lockTtlMs: ${TOKENS_LOCK_TTL_MS:60000} # 60 seconds

stopLoss:
    initialSlippageCapPct: ${STOP_LOSS_INITIAL_SLIPPAGE_CAP_PCT:0.01}
    retrySlippageCapPct: ${STOP_LOSS_RETRY_SLIPPAGE_CAP_PCT:0.02}
    confirmDurationMs: ${STOP_LOSS_CONFIRM_DURATION_MS:30000} # 30 seconds
    penetrationPct: ${STOP_LOSS_PENETRATION_PCT:0.002} # 0.2%
    breachTtlSeconds: ${STOP_LOSS_BREACH_TTL_SECONDS:300} # 5 minutes

swap:
    initialL2BufferPct: ${SWAP_INITIAL_L2_BUFFER_PCT:0.001}
    retryL2BufferPct: ${SWAP_RETRY_L2_BUFFER_PCT:0.005}
    minFillRatioPct: ${SWAP_MIN_FILL_RATIO_PCT:0.05}

logging:
    level: ${LOG_LEVEL:trace}
    pretty: ${LOG_PRETTY:true}

metrics:
    enabled: ${METRICS_ENABLED:true}
    path: /metrics
